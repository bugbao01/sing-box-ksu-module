name: Build Core Module
on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      [
        "bin/**",
        "service.sh",
        "customize.sh",
        "uninstall.sh",
        "module.prop",
        ".github/workflows/release.yml",
        "CHANGELOG.md",
      ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: sbc-rs

      - name: Cache Cross Binary
        id: cache-cross
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cross
          key: ${{ runner.os }}-cross-bin-v1

      - name: Install Cross (Binary)
        if: steps.cache-cross.outputs.cache-hit != 'true'
        run: |
          echo "🚀 Downloading cross binary..."
          curl -L https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-musl.tar.gz | tar -xz -C ~/.cargo/bin
          chmod +x ~/.cargo/bin/cross
          ~/.cargo/bin/cross --version

      - name: Cache Cross Docker Image
        id: cache-docker
        uses: actions/cache@v4
        with:
          path: /tmp/cross-image.tar
          key: docker-ghcr-cross-rs-aarch64-linux-android-edge

      - name: Load Docker Image
        if: steps.cache-docker.outputs.cache-hit == 'true'
        run: docker load --input /tmp/cross-image.tar

      - name: Pull & Save Docker Image
        if: steps.cache-docker.outputs.cache-hit != 'true'
        run: |
          echo "⬇️ Pulling Docker image..."
          docker pull ghcr.io/cross-rs/aarch64-linux-android:edge
          echo "💾 Saving Docker image to cache..."
          docker save ghcr.io/cross-rs/aarch64-linux-android:edge -o /tmp/cross-image.tar

      - name: Build sbc-rs (Android)
        run: |
          cd sbc-rs
          cross build --release --target aarch64-linux-android --locked
          echo "✅ Build complete"

      - name: Move sbc-rs to bin
        run: |
          mkdir -p bin
          mv sbc-rs/target/aarch64-linux-android/release/sbc-rs bin/
          chmod +x bin/sbc-rs
          ls -lh bin/sbc-rs

      - name: Fetch Latest Core
        env:
          # 显式引用 Token，确保有权限调用 API
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 Fetching latest sing-box version..."

          # 1. 抓取版本号 (带 Token)
          # 注意：这里加了 -H Authorization
          SB_VER=$(curl -s -H "Authorization: Bearer $GH_TOKEN" https://api.github.com/repos/Mice-Tailor-Infra/sing-box-auto-build-ci/releases | jq -r 'map(select(.tag_name | contains("alpha") | not)) | .[0].tag_name')

          # 增加空值检测，防止报错也不知情
          if [ -z "$SB_VER" ] || [ "$SB_VER" == "null" ]; then
            echo "❌ Error: Failed to fetch version tag. API limit exceeded or repo not found."
            exit 1
          fi

          echo "✅ Detected version: $SB_VER"

          # 2. 获取下载地址 (带 Token)
          DOWNLOAD_URL=$(curl -s -H "Authorization: Bearer $GH_TOKEN" https://api.github.com/repos/Mice-Tailor-Infra/sing-box-auto-build-ci/releases/tags/$SB_VER | jq -r '.assets[] | select(.name | contains("android-arm64")) | .browser_download_url')

          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" == "null" ]; then
             echo "❌ Error: Could not find android-arm64 asset."
             exit 1
          fi

          echo "⬇️ Downloading from: $DOWNLOAD_URL"
          curl -L -o sb.tar.gz "$DOWNLOAD_URL"

          # 3. 鲁棒解压逻辑
          mkdir -p temp_sb
          tar -xzf sb.tar.gz -C temp_sb/

          # 地毯式搜索
          TARGET_BIN=$(find temp_sb -type f -name "sing-box" | head -n 1)
          if [ -z "$TARGET_BIN" ]; then
              TARGET_BIN=$(find temp_sb -type f -name "sing-box*" ! -name "*.tar.gz" | head -n 1)
          fi

          if [ -n "$TARGET_BIN" ]; then
              mv "$TARGET_BIN" bin/sing-box
              chmod +x bin/sing-box
              echo "✅ Sing-box core successfully installed."
          else
              echo "❌ Error: Binary not found in archive."
              exit 1
          fi

          rm -rf temp_sb sb.tar.gz

      - name: Prepare Module Metadata
        run: |
          BASE_VER=$(grep -m 1 "^## " CHANGELOG.md | sed 's/## //')
          # 提取最新版本的 Release Notes (跳过第一个 ## 标题行及随后的空行)
          # awk '/^## /{count++; next} count==1{print}' CHANGELOG.md | sed '/./,$!d' > release_notes.md
          # 版本号只保留基础版，不带 cfg 碎屑
          V_CODE=$(date +%Y%m%d%H)
          sed -i "s/\${DISPLAY_VER}/$BASE_VER/" module.prop
          sed -i "s/\${V_CODE}/$V_CODE/" module.prop
          # Add timestamp to module.prop updateJson
          sed -i "s|update.json|update.json?t=$V_CODE|" module.prop
          echo "VERSION=$BASE_VER" >> $GITHUB_ENV

      - name: Pack and Release
        run: |
          ZIP_NAME="sing-box-ksu-module-${{ env.VERSION }}.zip"
          # [Original Slim Logic] 只打包核心文件，排除文本文档和示例配置（云端管理）
          # zip -ry "$ZIP_NAME" bin/ system/ customize.sh uninstall.sh service.sh module.prop README.md

          # [Local Test Logic] 打包包含 Config 模板和 .env 的全量包，方便离线测试
          zip -ry "$ZIP_NAME" bin/ system/ customize.sh uninstall.sh service.sh module.prop README.md config.template.json .env.example
          echo "ZIP_PATH=$ZIP_NAME" >> $GITHUB_ENV

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: ${{ env.ZIP_PATH }}
          # body_path: release_notes.md
          generate_release_notes: false

      - name: Upload Module Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_PATH }}
          path: ${{ env.ZIP_PATH }}

      - name: Update OTA Metadata
        run: |
          # 1. 更新 update.json
          jq ".version = \"${{ env.VERSION }}\" | .versionCode = $(date +%Y%m%d%H) | .zipUrl = \"https://ghfast.top/https://github.com/${{ github.repository }}/releases/latest/download/${{ env.ZIP_PATH }}\" | .changelog = \"https://miceworld.top/sing-box-ksu-module/CHANGELOG.md?t=$(date +%Y%m%d%H)\"" update.json > tmp.json && mv tmp.json update.json

          # 2. 配置 Git 身份
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"

          # 3. 只提交 update.json，不要提交 module.prop (保持占位符)
          git add update.json

          # 4. 只在 update.json 真正变化时才提交，防止在只更改 README 或 CI 逻辑时产生空的 chore commit
          # 使用 -- update.json 限制 diff 范围，并清理中间产物
          rm -f release_notes.md
          git diff-index --quiet HEAD update.json || (git commit -m "chore: release ${{ env.VERSION }} [skip ci]" && git push)
